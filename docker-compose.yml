services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vnindex_signal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vnindex_signal
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/vnindex_signal
      API_SECRET_KEY: dev-secret-key-change-in-prod
      CORS_ORIGINS: '["http://localhost:3000"]'
      FIREANT_TOKEN: ${FIREANT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL_INTERNAL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
