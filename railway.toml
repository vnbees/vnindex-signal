[[services]]
name = "backend"
source = "backend/"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30

[services.variables]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
API_SECRET_KEY = "${{API_SECRET_KEY}}"
PORT = "8000"
CORS_ORIGINS = '["https://${{frontend.RAILWAY_PUBLIC_DOMAIN}}"]'

[[services]]
name = "frontend"
source = "frontend/"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "node server.js"
healthcheckPath = "/thong-ke-tin-hieu-co-phieu-hom-nay"
healthcheckTimeout = 30

[services.variables]
NEXT_PUBLIC_API_URL = "https://${{backend.RAILWAY_PUBLIC_DOMAIN}}"
# Server-side fetch for /admin/feedback (same host as public API; avoids missing client env in SSR)
API_URL_INTERNAL = "https://${{backend.RAILWAY_PUBLIC_DOMAIN}}"
NEXT_PUBLIC_GA_ID = "G-G6MDQP55NB"
PORT = "3000"
# ADMIN_API_KEY: set in Railway on the frontend service (Variables) — raw sk-vnindex-... matching api_keys.
# Or use Shared Variables + reference ${{shared.ADMIN_API_KEY}} in the dashboard.
