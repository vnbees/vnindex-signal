[[services]]
name = "backend"
source = "backend/"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "./start.sh"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30

[services.variables]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
API_SECRET_KEY = "${{API_SECRET_KEY}}"
PORT = "8000"
# Theo domain public của frontend (custom domain + apex) để trình duyệt gọi API không bị CORS.
CORS_ORIGINS = '["https://${{frontend.RAILWAY_PUBLIC_DOMAIN}}","https://www.viistock.io.vn","https://viistock.io.vn"]'
FIREANT_API_BASE = "https://api.fireant.vn"
REVIEW_V2_CACHE_TTL_SECONDS = "900"

[[services]]
name = "frontend"
source = "frontend/"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30

[services.variables]
# Railway does not mirror these into the dashboard Variables tab; add the same keys there if you want them visible (docs: Config as Code).
NEXT_PUBLIC_API_URL = "https://${{backend.RAILWAY_PUBLIC_DOMAIN}}"
# Server-side fetch for /admin/feedback (same host as public API; avoids missing client env in SSR)
API_URL_INTERNAL = "https://${{backend.RAILWAY_PUBLIC_DOMAIN}}"
NEXT_PUBLIC_GA_ID = "G-G6MDQP55NB"
NEXT_PUBLIC_GOOGLE_ADS_ID = "AW-880926849"
PORT = "3000"

[[services]]
name = "daily-balanced-runner"
source = "daily-balanced-runner-service/"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "node index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30

[services.variables]
AUTOMATION_BASE_URL = "https://${{backend.RAILWAY_PUBLIC_DOMAIN}}"
AUTOMATION_TOKEN = "${{AUTOMATION_TOKEN}}"
PORT = "8080"
